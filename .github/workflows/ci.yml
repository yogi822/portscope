name: CI

# Quality gate: install, test, and build on every push/PR to main.
# Security scanning lives in the separate "Security Pipeline" workflow.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm # reuse npm cache keyed off package-lock.json

      # Nmap is intentionally NOT installed: the test suite uses XML fixtures
      # and an injected fake DNS resolver, so no real scans run in CI.
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json found — using npm ci"
            npm ci
          else
            echo "no package-lock.json — using npm install"
            npm install
          fi

      - name: Run tests
        run: npm test

      - name: Build workspaces
        run: npm run build

      # Advisory only — the blocking dependency gate is OWASP CVE Lite in the
      # Security Pipeline. This surfaces issues without failing CI.
      - name: Audit dependencies (non-blocking)
        run: npm audit --audit-level=high || true
