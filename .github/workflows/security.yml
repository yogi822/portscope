name: Security Pipeline

# DevSecOps gate. Every stage is BLOCKING — the workflow fails immediately on
# detected secrets, Semgrep ERROR findings, or HIGH/CRITICAL dependency CVEs.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly (Mon 06:00 UTC): catch newly disclosed CVEs
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Cancel superseded runs on the same ref to keep the Actions view clean.
concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; scan jobs opt into security-events: write.
permissions:
  contents: read

# Single source of truth for tool + runtime versions.
env:
  NODE_VERSION: "22"
  SEMGREP_VERSION: "1.90.0"
  CVE_LITE_VERSION: "1.25.0"

jobs:
  # ================================================================
  # Stage 1 — Secret scanning. Fails on ANY detected secret.
  # ================================================================
  secret-scan:
    name: Stage 1 · Secrets (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # scan every commit, not just the tip

      - name: Scan git history for secrets
        # Third-party action pinned to a full commit SHA (supply-chain hardening).
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false" # artifact handled by shared action
          GITLEAKS_ENABLE_COMMENTS: "false" # keep permissions minimal

      - name: Publish secret-scan report
        if: always()
        uses: ./.github/actions/publish-security-report
        with:
          sarif-file: results.sarif
          category: gitleaks
          artifact-name: gitleaks-report
          report-files: results.sarif

  # ================================================================
  # Stage 2 — Static analysis (SAST). Fails on ERROR-severity findings.
  # ================================================================
  static-analysis:
    name: Stage 2 · SAST (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Official Semgrep ships as the semgrep/semgrep container image (the
      # dedicated semgrep-action was archived in 2024). Run it via docker so the
      # job stays on ubuntu-latest and the JS-based checkout / SARIF-upload /
      # artifact steps keep a Node runtime — the Semgrep image has no Node. No
      # Python/pip is involved. Semgrep respects .gitignore, so node_modules/
      # dist/build are skipped. --severity=ERROR + --error keeps the gate
      # identical: fail the job ONLY on ERROR-severity findings.
      - name: Run Semgrep (official image, fail on ERROR)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" -w /src \
            "semgrep/semgrep:${SEMGREP_VERSION}" \
            semgrep scan \
              --config=p/security-audit \
              --config=p/owasp-top-ten \
              --config=p/nodejs \
              --config=p/typescript \
              --severity=ERROR \
              --sarif --output=semgrep.sarif \
              --error

      - name: Publish SAST report
        if: always()
        uses: ./.github/actions/publish-security-report
        with:
          sarif-file: semgrep.sarif
          category: semgrep
          artifact-name: semgrep-report
          report-files: semgrep.sarif

  # ================================================================
  # Stage 3 — Dependency CVE scan. Fails on HIGH/CRITICAL vulnerabilities.
  # ================================================================
  dependency-scan:
    name: Stage 3 · Dependencies (OWASP CVE Lite)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Gate + SARIF. fail-on: high => exits non-zero AT OR ABOVE high, so HIGH
      # and CRITICAL block while MEDIUM/LOW/UNKNOWN do not. The report is written
      # before the non-zero exit, so downstream steps can still publish it.
      - name: Scan dependencies (fail on HIGH/CRITICAL)
        # Third-party action pinned to a full commit SHA (supply-chain hardening).
        uses: OWASP/cve-lite-cli@2eed959b8641042472d2810444393b88d5454e62 # v1
        with:
          path: .
          version: ${{ env.CVE_LITE_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          sarif: "true"
          fail-on: high

      - name: Generate JSON report
        if: always()
        run: npx --yes "cve-lite@${CVE_LITE_VERSION}" . --json > cve-report.json || true

      # The CLI writes a timestamped *.sarif; normalize to a stable name so the
      # shared publish action can consume it uniformly.
      - name: Normalize SARIF filename
        if: always()
        run: |
          for f in *.sarif; do
            [ -e "$f" ] || continue
            [ "$f" = "cve-lite.sarif" ] && break
            mv "$f" cve-lite.sarif
            break
          done

      - name: Publish dependency-scan report
        if: always()
        uses: ./.github/actions/publish-security-report
        with:
          sarif-file: cve-lite.sarif
          category: cve-lite
          artifact-name: cve-report
          report-files: |
            cve-report.json
            cve-lite.sarif

  # ================================================================
  # Aggregated summary — one clean grouped view of every stage.
  # Runs regardless of prior results and reflects the overall gate status.
  # ================================================================
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [secret-scan, static-analysis, dependency-scan]
    if: always()
    steps:
      - name: Render summary
        env:
          SECRETS_RESULT: ${{ needs.secret-scan.result }}
          SAST_RESULT: ${{ needs.static-analysis.result }}
          DEPS_RESULT: ${{ needs.dependency-scan.result }}
        run: |
          icon() { case "$1" in success) echo "✅ passed";; failure) echo "❌ failed";; *) echo "⚠️ $1";; esac; }
          {
            echo "## 🛡️ DevSecOps Security Pipeline"
            echo ""
            echo "| Stage | Tool | Gate | Result |"
            echo "|-------|------|------|--------|"
            echo "| 1 · Secrets | Gitleaks | any secret | $(icon "$SECRETS_RESULT") |"
            echo "| 2 · SAST | Semgrep | ERROR severity | $(icon "$SAST_RESULT") |"
            echo "| 3 · Dependencies | OWASP CVE Lite | HIGH / CRITICAL | $(icon "$DEPS_RESULT") |"
            echo ""
            echo "SARIF results are in the **Security → Code Scanning** tab; full reports are attached as run artifacts."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce overall gate
        if: ${{ needs.secret-scan.result == 'failure' || needs.static-analysis.result == 'failure' || needs.dependency-scan.result == 'failure' }}
        run: |
          echo "One or more security stages failed — see the summary above."
          exit 1
